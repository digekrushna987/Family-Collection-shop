<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛍️ My Online Shop</h1>
    <button onclick="viewCart()">Cart (<span id="cart-count">0</span>)</button>
</header>

<section class="products">
    <div class="card">
        <h3>Shoes</h3>
        <p>Price: ₹1000</p>
        <button onclick="addToCart('Shoes', 1000)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>T-Shirt</h3>
        <p>Price: ₹500</p>
        <button onclick="addToCart('T-Shirt', 500)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Watch</h3>
        <p>Price: ₹1500</p>
        <button onclick="addToCart('Watch', 1500)">Add to Cart</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
